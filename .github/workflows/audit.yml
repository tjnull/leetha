name: Security Audit

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          pip install pip-audit ruff
          mkdir -p src/leetha/ui/web/dist
          echo '<html></html>' > src/leetha/ui/web/dist/index.html
          pip install .
      - name: Dependency audit
        run: pip-audit
      - name: Code quality
        run: ruff check src/
